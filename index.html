<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Game Map - Alley</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui-layer {
            position: absolute; bottom: 20px; left: 20px;
            color: #fff; font-family: monospace; font-size: 14px;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 5px;
            pointer-events: none; border: 1px solid #333;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>

    <div id="ui-layer">
        [GAME MAP PREVIEW]<br>
        • WASD / Mouse: カメラ操作（Orbit）<br>
        • Rendering: WebGL2 + PBR + UnrealBloom
    </div>
    <div id="canvas-container"></div>

    <script>
        // --- 1. シーン・レンダラーの初期化 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x05050a, 0.04); // 深い夜の霧

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 8); // プレイヤーの目線（高さ1.6m）にリセット

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 重くならないよう上限2に制限
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping; // 映画調のトーンマップ
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1.6, 0); // プレイヤーの目線の先を注視

        // --- 2. ライティング（ゲーム向けに最適化） ---
        const ambientLight = new THREE.AmbientLight(0x020205, 0.2); // 暗部が潰れない程度の環境光
        scene.add(ambientLight);

        // 月明かり（ディレクショナル）
        const moonLight = new THREE.DirectionalLight(0x111827, 2.0);
        moonLight.position.set(5, 20, -5);
        moonLight.castShadow = true;
        moonLight.shadow.mapSize.width = 2048; // ゲーム用高解像度シャドウ
        moonLight.shadow.mapSize.height = 2048;
        moonLight.shadow.bias = -0.0001; // 影の隙間（ピーターパニング）対策
        scene.add(moonLight);

        // --- 3. ポストプロセッシング（命を吹き込む処理） ---
        const renderPass = new THREE.RenderPass(scene, camera);
        
        // UnrealBloomPass(解像度, 強度, 半径, 閾値) - ネオンの光らせ方を調整
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight), 
            1.5,  // 強度 (1.5で強めのネオン感)
            0.4,  // 半径
            0.15  // 閾値 (どの明るさから光らせるか)
        );

        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderPass);
        composer.addPass(bloomPass);

        // --- 4. マテリアル（PBR：物理ベース設定） ---
        // テクスチャ画像がないため、擬似的に数値で濡れた路面や質感を設定
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x0a0a0a,
            roughness: 0.15, // 低いほどツルツル（濡れて反射する路面）
            metalness: 0.5,
        });

        const wallMat = new THREE.MeshStandardMaterial({
            color: 0x1c1c1e,
            roughness: 0.8,  // ザラザラしたコンクリート
            metalness: 0.1
        });

        // --- 5. ジオメトリ配置（仮のマップアセット） ---
        // 地面
        const floorGeo = new THREE.PlaneGeometry(30, 100);
        const floor = new THREE.Mesh(floorGeo, groundMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // 裏路地の壁（アパート群のベース）
        for(let i = -50; i < 50; i += 10) {
            // 左側
            createBox(wallMat, -3.5, 5, i, 2, 10, 10, true);
            // 右側
            createBox(wallMat, 3.5, 5, i, 2, 10, 10, true);
            
            // サイバーパンクなエミッシブ（自発光）ネオン
            if(Math.random() > 0.4) {
                const neonColor = Math.random() > 0.5 ? 0x00ffff : 0xff00ff;
                const neonMat = new THREE.MeshStandardMaterial({
                    color: neonColor,
                    emissive: neonColor,
                    emissiveIntensity: 4.0 // Bloomで光り輝く強度
                });
                // 左か右の壁に貼り付ける
                const side = Math.random() > 0.5 ? -2.4 : 2.4;
                createBox(neonMat, side, 4 + Math.random()*3, i + (Math.random()*4), 0.1, 2, 0.5, false);

                // ネオンが周囲を照らすリアルなポイントライト
                const pLight = new THREE.PointLight(neonColor, 3, 6);
                pLight.position.set(side * 0.9, 4, i);
                pLight.castShadow = true;
                pLight.shadow.bias = -0.002;
                scene.add(pLight);
            }
        }

        function createBox(mat, x, y, z, w, h, d, shadow) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            if(shadow) {
                mesh.castShadow = true;
                mesh.receiveShadow = true;
            }
            scene.add(mesh);
            return mesh;
        }

        // --- 6. 本番運用：Blenderからのモデル読み込み機構 ---
        // 本番はここを有効化し、上の仮ジオメトリ配置と差し替えます
        /*
        const loader = new THREE.GLTFLoader();
        loader.load('assets/models/cyberpunk_alley.glb', (gltf) => {
            const model = gltf.scene;
            model.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                    // 必要に応じてマテリアルの調整
                }
            });
            scene.add(model);
        }, undefined, (error) => { console.error(error); });
        */

        // --- 7. ループ処理 ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const elapsedTime = clock.getElapsedTime();
            controls.update();

            // レンダラーの代わりに「composer」で描画（ポストプロセッシングの適用）
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
