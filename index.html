<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D自由ペイントかくれんぼ（屋内戦）</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; user-select: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 8px; z-index: 10; max-width: 260px; }
        input, button { margin-top: 5px; padding: 6px; font-size: 14px; width: 100%; box-sizing: border-box; border: none; border-radius: 4px; }
        button { background: #e67e22; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #d35400; }
        #color-picker { height: 35px; padding: 0; cursor: pointer; }
        .mode-indicator { font-weight: bold; padding: 5px; border-radius: 4px; text-align: center; margin-top: 5px; }
        .move-mode { background: #27ae60; }
        .paint-mode { background: #2980b9; }
        hr { border: 0; border-top: 1px solid #444; margin: 10px 0; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="ui">
        <h3>🏠 屋内ペイントかくれんぼ</h3>
        <p>あなたのID: <span id="my-id" style="color:#f1c40f;">接続中...</span></p>
        <hr>
        <p>🎨 <strong>ペイントブラシ設定</strong></p>
        <input type="color" id="color-picker" value="#ff0000">
        <div id="mode-tag" class="mode-indicator move-mode">【SPACEキー】で切り替え<br>現在: 移動モード</div>
        <hr>
        <p>🔗 <strong>マルチプレイ</strong></p>
        <input type="text" id="peer-id-input" placeholder="友達のIDを入力">
        <button id="connect-btn">部屋に入る</button>
        <hr>
        <p style="font-size: 11px; color: #ccc;">
            <strong>移動モード:</strong> WASD / 矢印キー<br>
            <strong>ペイントモード:</strong> マウスドラッグで自分の体を自由に塗る！壁の模様に化けろ！
        </p>
    </div>

    <script>
        // --- 1. 3D空間・ライトの初期化 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111116); // 屋内の暗がり
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 屋内っぽい照明（環境光＋スポットライト）
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        
        const mainLight = new THREE.PointLight(0xffffff, 0.8, 100);
        mainLight.position.set(0, 15, 0);
        scene.add(mainLight);

        // --- 2. お絵描き（キャンバス）テクスチャの設定 ---
        // 自分の体を塗るための2Dキャンバスを裏で作る
        const canvasSize = 256;
        const paintCanvas = document.createElement('canvas');
        paintCanvas.width = canvasSize;
        paintCanvas.height = canvasSize;
        const ctx = paintCanvas.getContext('2d');
        ctx.fillStyle = '#34495e'; // 初期色（地味な灰色）
        ctx.fillRect(0, 0, canvasSize, canvasSize);

        const myTexture = new THREE.CanvasTexture(paintCanvas);
        const myMaterial = new THREE.MeshLambertMaterial({ map: myTexture });

        let brushColor = '#ff0000';
        document.getElementById('color-picker').addEventListener('input', (e) => {
            brushColor = e.target.value;
        });

        // --- 3. しっかりした屋内マップの構築 ---
        const wallMaterial = new THREE.MeshLambertMaterial({ color: 0x2c3e50 });
        const floorMaterial = new THREE.MeshLambertMaterial({ color: 0x1a252f });
        const objectColors = [0xe74c3c, 0x2ecc71, 0x9b59b6, 0xf1c40f, 0x1abc9c];

        // 床
        const floorGeo = new THREE.PlaneGeometry(50, 50);
        const floor = new THREE.Mesh(floorGeo, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 壁やオブジェクトを配置する関数
        function addWall(w, h, d, x, y, z) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geo, wallMaterial);
            mesh.position.set(x, y, z);
            scene.add(mesh);
        }

        function addProp(geo, colorIndex, x, z) {
            const mat = new THREE.MeshLambertMaterial({ color: objectColors[colorIndex] });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, geo.parameters.height ? geo.parameters.height/2 : 0.5, z);
            scene.add(mesh);
        }

        // 外壁（部屋を囲う）
        addWall(50, 6, 1, 0, 3, -25); // 奥
        addWall(50, 6, 1, 0, 3, 25);  // 手前
        addWall(1, 6, 50, -25, 3, 0); // 左
        addWall(1, 6, 50, 25, 3, 0);  // 右

        // 内壁（部屋を区切って迷路・屋内感を出す）
        addWall(1, 6, 20, -10, 3, -5);  // 左の小部屋の壁
        addWall(20, 6, 1, 10, 3, 5);    // 右の仕切り壁
        addWall(15, 6, 1, -5, 3, 12);   // 中央下の目隠し壁

        // 擬態用のカラフルなオブジェクト（柱や箱）を部屋中にしっかり配置
        const boxGeo = new THREE.BoxGeometry(3, 3, 3);
        const tallGeo = new THREE.CylinderGeometry(1.5, 1.5, 6, 16);

        addProp(boxGeo, 0, -18, -18); // 赤い箱（左奥）
        addProp(tallGeo, 1, -18, 15); // 緑の柱（左手前）
        addProp(boxGeo, 2, 18, -15);  // 紫の箱（右奥）
        addProp(tallGeo, 3, 15, 18);  // 黄色の柱（右手前）
        addProp(boxGeo, 4, 0, -5);    // 青緑の箱（中央）
        
        // 縞々の擬態用オブジェクト
        for(let i=0; i<3; i++) {
            const stripGeo = new THREE.BoxGeometry(2, 5, 2);
            addProp(stripGeo, i%2===0 ? 0 : 3, 5 + (i*4), -18);
        }

        // --- 4. 3Dプレイヤー（棒人間）の生成 ---
        function createStickman(materialObj) {
            const group = new THREE.Group();

            // 頭 (球体)
            const headGeo = new THREE.SphereGeometry(0.4, 16, 16);
            const head = new THREE.Mesh(headGeo, materialObj);
            head.position.y = 2.2;
            head.name = "paintable"; // 塗れる対象フラグ
            group.add(head);

            // 胴体 (円柱)
            const bodyGeo = new THREE.CylinderGeometry(0.25, 0.25, 1.0, 16);
            const body = new THREE.Mesh(bodyGeo, materialObj);
            body.position.y = 1.4;
            body.name = "paintable";
            group.add(body);

            // 足
            const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.9, 8);
            const leftLeg = new THREE.Mesh(legGeo, materialObj); leftLeg.position.set(-0.2, 0.45, 0);
            const rightLeg = new THREE.Mesh(legGeo, materialObj); rightLeg.position.set(0.2, 0.45, 0);
            group.add(leftLeg, rightLeg);

            // 腕
            const armGeo = new THREE.CylinderGeometry(0.07, 0.07, 0.8, 8);
            const leftArm = new THREE.Mesh(armGeo, materialObj); leftArm.position.set(-0.4, 1.4, 0);
            const rightArm = new THREE.Mesh(armGeo, materialObj); rightArm.position.set(0.4, 1.4, 0);
            group.add(leftArm, rightArm);

            return group;
        }

        const myCharacter = createStickman(myMaterial);
        scene.add(myCharacter);

        camera.position.set(0, 12, 18);
        camera.lookAt(myCharacter.position);

        // --- 5. モード切り替えとお絵描き（ペイント）ロジック ---
        let isPaintMode = false;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDrawing = false;

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                isPaintMode = !isPaintMode;
                const tag = document.getElementById('mode-tag');
                if (isPaintMode) {
                    tag.innerText = "【SPACEキー】で切り替え\n現在: ペイントモード";
                    tag.className = "mode-indicator paint-mode";
                } else {
                    tag.innerText = "【SPACEキー】で切り替え\n現在: 移動モード";
                    tag.className = "mode-indicator move-mode";
                    isDrawing = false;
                }
            }
        });

        // マウスによるペイント処理
        window.addEventListener('mousedown', () => { if(isPaintMode) isDrawing = true; });
        window.addEventListener('mouseup', () => { isDrawing = false; });
        window.addEventListener('mousemove', (e) => {
            if (!isPaintMode || !isDrawing) return;

            // マウス位置を3D座標に変換
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            // 自分のキャラクターのパーツとの当たり判定
            const intersects = raycaster.intersectObjects(myCharacter.children);

            if (intersects.length > 0 && intersects[0].object.name === "paintable") {
                const hit = intersects[0];
                if (hit.uv) {
                    // 当たった部分のUV座標（テクスチャの上の位置）をキャンバスの座標に変換
                    const x = hit.uv.x * canvasSize;
                    const y = (1 - hit.uv.y) * canvasSize;

                    // 裏のキャンバスに円を描く（スプレー効果）
                    ctx.fillStyle = brushColor;
                    ctx.beginPath();
                    ctx.arc(x, y, 8, 0, Math.PI * 2);
                    ctx.fill();

                    // テクスチャを更新
                    myTexture.needsUpdate = true;
                }
            }
        });

        // --- 6. P2P通信（PeerJS）の設定 ---
        const peer = new Peer();
        let connections = [];
        const otherPlayers = {};

        peer.on('open', (id) => { document.getElementById('my-id').innerText = id; });
        peer.on('connection', (conn) => { setupConnection(conn); });
        document.getElementById('connect-btn').addEventListener('click', () => {
            const targetId = document.getElementById('peer-id-input').value.trim();
            if (targetId) setupConnection(peer.connect(targetId));
        });

        function setupConnection(conn) {
            connections.push(conn);
            conn.on('open', () => {
                // 相手用のキャンバスとマテリアルを個別に作成
                const pCanvas = document.createElement('canvas');
                pCanvas.width = canvasSize; pCanvas.height = canvasSize;
                const pCtx = pCanvas.getContext('2d');
                pCtx.fillStyle = '#34495e'; pCtx.fillRect(0, 0, canvasSize, canvasSize);
                
                const pTexture = new THREE.CanvasTexture(pCanvas);
                const pMaterial = new THREE.MeshLambertMaterial({ map: pTexture });
                
                const pMesh = createStickman(pMaterial);
                scene.add(pMesh);

                otherPlayers[conn.peer] = { mesh: pMesh, canvas: pCanvas, ctx: pCtx, texture: pTexture };
            });

            conn.on('data', (data) => {
                const p = otherPlayers[data.id];
                if (p) {
                    p.mesh.position.set(data.x, data.y, data.z);
                    // 相手のペイントデータを復元（画像データとしてキャンバスに描画）
                    const img = new Image();
                    img.onload = () => {
                        p.ctx.drawImage(img, 0, 0);
                        p.texture.needsUpdate = true;
                    };
                    img.src = data.canvasData;
                }
            });
        }

        // --- 7. 移動操作とメインループ ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function update() {
            // ペイントモード中は移動をストップ
            if (!isPaintMode) {
                const speed = 0.15;
                if (keys['ArrowUp'] || keys['KeyW']) myCharacter.position.z -= speed;
                if (keys['ArrowDown'] || keys['KeyS']) myCharacter.position.z += speed;
                if (keys['ArrowLeft'] || keys['KeyA']) myCharacter.position.x -= speed;
                if (keys['ArrowRight'] || keys['KeyD']) myCharacter.position.x += speed;

                // 壁の外に出られないように簡易制限（マップの内側に閉じ込める）
                myCharacter.position.x = Math.max(-24, Math.min(24, myCharacter.position.x));
                myCharacter.position.z = Math.max(-24, Math.min(24, myCharacter.position.z));
            }

            // カメラ追従
            camera.position.x = myCharacter.position.x;
            camera.position.z = myCharacter.position.z + 14;
            camera.position.y = myCharacter.position.y + 8;
            camera.lookAt(myCharacter.position);

            // データの送信（キャンバスの絵をデータURL化して同期）
            if (connections.length > 0) {
                const myState = {
                    id: peer.id,
                    x: myCharacter.position.x,
                    y: myCharacter.position.y,
                    z: myCharacter.position.z,
                    canvasData: paintCanvas.toDataURL() // お絵描きデータを文字列化
                };
                connections.forEach(conn => { if (conn.open) conn.send(myState); });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
